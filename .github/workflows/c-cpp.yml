name: CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi  # Instaluje ARM kompilátor

      - name: Install Dependencies
        run: |
          sudo apt-get install -y cmake build-essential

      - name: Create Build Directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: ./build
        run: cmake ../logic_probe -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -Wno-dev  # Potlačí warning pro vývojáře

      - name: Build Project
        working-directory: ./build
        run: cmake --build . --config ${{ env.BUILD_TYPE }}
